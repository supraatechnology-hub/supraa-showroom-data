name: Precompute Room Masks (SAM 3)

on:
  workflow_dispatch:
    inputs:
      room_id:
        description: "Room ID (e.g. kitchen_01)"
        required: true
      client_slug:
        description: "Client slug (e.g. rajtilesdelhi, goldengranite)"
        required: true
      category:
        description: "Room category (e.g. kitchen, bathroom, living_room)"
        required: true
        default: "living_room"

jobs:
  segment:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      HUGGING_FACE_HUB_TOKEN: ${{ secrets.HF_TOKEN }}
      R2_ENDPOINT:            ${{ secrets.R2_ENDPOINT }}
      R2_ACCESS_KEY_ID:       ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY:   ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME:         ${{ secrets.R2_BUCKET_NAME }}
      BACKEND_URL:            ${{ secrets.BACKEND_URL }}
      INTERNAL_ROOM_SECRET:   ${{ secrets.INTERNAL_ROOM_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Restore SAM 3 model cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: sam3-hf-cache-v1
          restore-keys: sam3-hf-cache-

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install transformers accelerate Pillow numpy boto3 requests

      - name: Run SAM 3 segmentation
        env:
          ROOM_ID:     ${{ inputs.room_id }}
          CLIENT_SLUG: ${{ inputs.client_slug }}
          CATEGORY:    ${{ inputs.category }}
        run: |
          python scripts/segment_sam3.py \
            --mode precompute \
            --room-id "$ROOM_ID" \
            --category "$CATEGORY" \
            --client-slug "$CLIENT_SLUG"

      - name: Validate masks
        env:
          ROOM_ID:     ${{ inputs.room_id }}
          CLIENT_SLUG: ${{ inputs.client_slug }}
        run: |
          python scripts/validate_mask.py \
            --client-slug "$CLIENT_SLUG" \
            --room-id "$ROOM_ID"

      - name: Mark room ready via backend
        env:
          ROOM_ID: ${{ inputs.room_id }}
        run: |
          python scripts/update_room_status.py --room-id "$ROOM_ID"
